<!doctype html>
<html lang=en>
<head>
    <meta charset=utf-8>
    <meta name=viewport content="width=device-width,initial-scale=1,maximum-scale=1">
    <title>NextDNS Logs - Categorias</title>
    
    <link rel=stylesheet href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">
    <link rel=stylesheet href="https://fonts.googleapis.com/css?family=Open+Sans:400,700">
    <style>
        body { font-family: 'Open Sans', sans-serif; padding-top: 70px; }
        .intro-header { text-align: center; margin-bottom: 40px; }
        .panel-heading { cursor: pointer; }
    </style>
</head>
<body>

<nav class="navbar navbar-default navbar-fixed-top">
    <div class=container-fluid>
        <div class=navbar-header>
            <a class=navbar-brand href="#">NextDNS Logs Dashboard</a>
        </div>
    </div>
</nav>

<header class=header-section>
    <div class=container>
        <div class=row>
            <div class="col-lg-8 col-lg-offset-2 text-center">
                <h1>Categorias de Bloqueio</h1>
                <hr class=small>
            </div>
        </div>
    </div>
</header>

<div class=container role=main>
    <div class="col-lg-8 col-lg-offset-2 col-md-10 col-md-offset-1">
        <article class=post-preview>
            <div class="panel-group" id="accordion">
                
                <div class="panel panel-default">
                    <div class="panel-heading" data-toggle="collapse" data-parent="#accordion" href="#collapse1">
                        <h4 class="panel-title">Publicidade e Rastreamento</h4>
                    </div>
                    <div id="collapse1" class="panel-collapse collapse in">
                        <div class="panel-body">
                            Lista de domínios bloqueados relacionados a anúncios e trackers de telemetria.
                        </div>
                    </div>
                </div>

                <div class="panel panel-default">
                    <div class="panel-heading" data-toggle="collapse" data-parent="#accordion" href="#collapse2">
                        <h4 class="panel-title">Segurança e Malware</h4>
                    </div>
                    <div id="collapse2" class="panel-collapse collapse">
                        <div class="panel-body">
                            Filtros ativos contra sites de phishing, C&C e domínios maliciosos conhecidos.
                        </div>
                    </div>
                </div>

            </div>
        </article>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/js/bootstrap.min.js"></script>

</body>
</html>
